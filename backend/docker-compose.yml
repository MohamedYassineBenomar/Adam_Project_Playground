# Postgres + pgAdmin per al projecte Mercat Local.
# Arrencar: docker compose up -d
# Aturar:   docker compose down
# Reset:    docker compose down -v   (esborra el volum i les dades)

services:
  postgres:
    image: postgres:16
    container_name: mercat_postgres
    environment:
      POSTGRES_DB: mercat_local
      POSTGRES_USER: mercat
      POSTGRES_PASSWORD: mercat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: mercat_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mercat.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
